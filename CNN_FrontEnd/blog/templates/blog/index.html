{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDGE-VISION Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg: #071013;
            --panel: #0f1f24;
            --panel-soft: #13292f;
            --line: #26434a;
            --mint: #36d399;
            --amber: #f4b942;
            --danger: #fb7185;
            --text: #e8f3f4;
            --muted: #91a8ad;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding-bottom: 78px;
            margin: 0;
            padding-top: 70px;
        }

        /* 공통 상단바 스타일 독립화 및 최상위 고정 */
        .topbar {
            background-color: rgba(15, 31, 36, 0.96);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(10px);
            z-index: 1050;
            width: 100%;

            /* 기존 배경색, 보더 등 유지... */
            z-index: 1050;
            width: 100%;
            
            /* 🚨 아래 4줄을 추가하세요! */
            position: fixed; 
            top: 0; 
            left: 0;
            transition: transform 0.3s ease-in-out; /
        }

        .topbar-hidden {
            transform: translateY(-100%); /* 상단바 높이만큼 위로 끌어올려 숨김 */
            
        }

        .bg-panel {
            background-color: var(--panel);
            border: 1px solid var(--line);
        }

        .text-mint { color: var(--mint); }
        .btn-mint { background-color: var(--mint); color: #03110c; border-color: var(--mint); }
        .btn-mint:hover { background-color: #66e7b6; color: #03110c; border-color: #66e7b6; }

        .metric {
            background-color: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 1rem;
            min-height: 112px;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid var(--line);
        }

        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .page-content {
            display: none;
            animation: fadeIn 0.25s ease-in-out;
        }

        .page-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .event-item {
            display: grid;
            grid-template-columns: minmax(0, 130px) 1fr;
            gap: 1rem;
            background: var(--panel);
            border: 1px solid var(--line);
            border-left: 4px solid var(--mint);
            border-radius: 8px;
            padding: 0.75rem;
        }

        .event-item.border-danger { border-left-color: var(--danger) !important; }
        .event-item.border-success { border-left-color: var(--mint) !important; }

        .bottom-nav {
            background-color: rgba(15, 31, 36, 0.98);
            border-top: 1px solid var(--line);
            z-index: 1000;
            position: fixed;
            bottom: 0; left: 0; width: 100%;
        }

        .nav-link {
            color: var(--muted);
            font-size: 0.75rem;
            text-align: center;
            cursor: pointer;
        }

        .nav-link:hover,
        .nav-link.active { color: var(--mint); }
        .nav-link i { font-size: 1.25rem; display: block; margin-bottom: 2px; }

        .form-control,
        .form-select {
            background-color: #08171b;
            border-color: var(--line);
            color: var(--text);
        }

        @media (max-width: 640px) {
            .event-item {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="container-fluid d-flex justify-content-between align-items-center gap-3 py-3" style="max-width: 1040px; margin: 0 auto;">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-shield-lock-fill text-mint fs-4"></i>
                <h1 class="h5 mb-0 fw-bold">EDGE-VISION</h1>
                <span class="badge rounded-pill text-bg-success">V50 HUB</span>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span class="badge rounded-pill d-inline-flex align-items-center" style="background-color: #38bdf8; color: #0b111a; font-weight: 700; padding: 6px 12px; font-size: 12px;">
                    <i class="bi bi-person-fill me-1"></i>{{ user.username }}
                </span>
                <span class="text-secondary small"><i class="bi bi-clock me-1"></i><span id="current-time-display">--:--</span></span>
            </div>
        </div>
    </header>

    <div class="container-fluid px-3 py-4" style="max-width: 1040px; margin: 0 auto;">
        <section class="bg-panel rounded-3 p-3 mb-4">
            <div class="row g-2 align-items-end">
                <div class="col-12 col-lg-7">
                    <label for="v50-base-url" class="form-label small text-secondary">V50 Edge Node Base URL</label>
                    <input id="v50-base-url" class="form-control" type="url" placeholder="http://192.168.216.204:8080">
                </div>
                <div class="col-6 col-lg-auto">
                    <button id="save-base-url" class="btn btn-outline-light w-100" type="button">
                        <i class="bi bi-save me-1"></i>저장
                    </button>
                </div>
                <div class="col-6 col-lg-auto">
                    <button id="ping-node" class="btn btn-mint w-100" type="button">
                        <i class="bi bi-wifi me-1"></i>Ping
                    </button>
                </div>
            </div>
            <p id="health-message" class="text-secondary small mb-0 mt-2">V50 노드 상태를 확인해 주세요.</p>

            <div id="notice" class="alert alert-info py-2 px-3 mt-3 mb-0" hidden></div>

            <div class="d-flex gap-2 mt-2">
                <span id="node-status-badge" class="badge rounded-pill text-bg-secondary">Unknown</span>
                <span id="device-online-badge" class="badge rounded-pill text-bg-secondary">Unknown</span>
            </div>
        </section>

        <main id="page-dashboard" class="page-content active">
            <section class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div>
                        <p class="text-secondary small mb-1">CAMERA 1</p>
                        <h2 class="h5 mb-0">Live Stream</h2>
                    </div>
                    <span class="badge text-bg-danger"><span class="spinner-grow spinner-grow-sm me-1"></span>REC</span>
                </div>
                <div class="video-container">
                    <img src="http://192.168.216.204:8080/video_feed" alt="CCTV live feed">
                </div>
            </section>

            <section class="row g-3 mb-4">
                <div class="col-12 col-md-4">
                    <div class="metric">
                        <i class="bi bi-activity text-mint fs-4"></i>
                        <p class="text-secondary small mb-1 mt-2">TIMELINE EVENTS</p>
                        <strong id="event-count" class="fs-4">0</strong>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="metric">
                        <i class="bi bi-clock-history text-mint fs-4"></i>
                        <p class="text-secondary small mb-1 mt-2">LAST EVENT</p>
                        <strong id="last-event-time" class="d-block text-truncate">-</strong>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="metric">
                        <i class="bi bi-cpu text-mint fs-4"></i>
                        <p class="text-secondary small mb-1 mt-2">AI NODE</p>
                        <strong>V50 NPU</strong>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <nav class="bottom-nav fixed-bottom w-100 px-3 py-2 d-flex justify-content-center gap-4">
        <a href="{% url 'dashboard' %}" class="nav-link active text-decoration-none">
            <i class="bi bi-grid-1x2-fill"></i>Dashboard
        </a>
        <a href="{% url 'history' %}" class="nav-link text-decoration-none">
            <i class="bi bi-clock-history"></i>History
        </a>
        <a href="{% url 'anomaly' %}" class="nav-link text-decoration-none">
            <i class="bi bi-exclamation-triangle"></i>Anomaly
        </a>
        <a href="{% url 'settings' %}" class="nav-link text-decoration-none">
            <i class="bi bi-gear"></i>Settings
        </a>
    </nav>

    <script type="module" src="{% static 'js/dashboard.js' %}?v=8080-1"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('current-time-display').innerText = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }
        setInterval(updateClock, 1000); updateClock();

        let lastScrollTop = 0;
        const topbar = document.querySelector('.topbar');

        window.addEventListener('scroll', function() {
            // 현재 스크롤 위치 가져오기
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > lastScrollTop && scrollTop > 60) {
                // 아래로 스크롤 중 & 맨 위에서 60px 이상 내려왔을 때 -> 상단바 숨김
                topbar.classList.add('topbar-hidden');
            } else {
                // 위로 스크롤 중이거나 최상단일 때 -> 상단바 나타남
                topbar.classList.remove('topbar-hidden');
            }
            
            lastScrollTop = scrollTop; // 현재 위치를 저장해두고 다음 번에 비교
        });
    </script>
</body>
</html>
